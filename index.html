<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat App</title>

    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="sidebar-header">
            <h2>ChatSphere</h2>
        </div>

        <div class="connection-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
        </div>

        <div class="chat-user active">
            <img src="https://i.pravatar.cc/150?img=47" alt="User">
            <div>
                <h4>Zara Quinn</h4>
                <small>Online</small>
            </div>
        </div>

    </aside>

    <!-- Main Chat -->
    <main class="chat-section">

        <!-- Header -->
        <header class="chat-header">

            <div class="header-user">
                <img src="https://i.pravatar.cc/150?img=47" alt="Avatar">

                <div>
                    <h3>Zara Quinn</h3>
                    <p id="userStatus">Online</p>
                </div>
            </div>

            <div class="header-icons">
                <button title="Call">
                    <i class="fas fa-phone"></i>
                </button>

                <button title="Video Call">
                    <i class="fas fa-video"></i>
                </button>

                <button title="Info">
                    <i class="fas fa-circle-info"></i>
                </button>
            </div>

        </header>

        <!-- Messages Area -->
        <section id="messages" class="messages-container">

            <!-- Messages dynamically inserted here -->

        </section>

        <!-- Typing Indicator -->
        <div id="typingIndicator" class="typing-indicator hidden">

            <span>Zara Quinn is typing</span>

            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>

        </div>

        <!-- Image Preview -->
        <div id="previewBox" class="preview-box hidden">

            <div class="preview-header">
                <span>Image Preview</span>

                <button id="removePreview">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <img id="previewImage" src="" alt="Preview">

        </div>

        <!-- Input Section -->
        <footer class="chat-footer">

            <div class="toolbar">

                <button id="emojiBtn" title="Emoji">
                    😀
                </button>

                <button id="uploadBtn" title="Upload Image">
                    <i class="fas fa-paperclip"></i>
                </button>

                <input
                    type="file"
                    id="imageUpload"
                    accept="image/*"
                    hidden
                >

            </div>

            <div class="input-wrapper">

                <textarea
                    id="messageInput"
                    maxlength="500"
                    placeholder="Type your message..."
                ></textarea>

            </div>

            <div class="bottom-controls">

                <span id="charCount">
                    0 / 500
                </span>

                <button id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                    Send
                </button>

            </div>

        </footer>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
